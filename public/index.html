<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Kawi ��� — 1.000 Grátis</title>
    <style>
        :root { --cinza-escuro: #1A1D23; --cinza-medio: #252932; --cinza-claro: #3A3F4B; --azul: #165DFF; --laranja: #FF7D00; --verde-fluo: #00FF94; --texto-branco: #FFFFFF; --texto-cinza: #D1D5DB; --borda: 12px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--cinza-escuro); color: var(--texto-cinza); min-height: 100vh; }
        header { background: var(--cinza-medio); padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--azul); }
        header h1 { color: var(--verde-fluo); font-size: 1.7rem; }
        .saldo { background: var(--cinza-claro); padding: 0.6rem 1.2rem; border-radius: var(--borda); color: var(--laranja); font-weight: 600; }
        .btn { padding: 0.75rem 1.5rem; border: none; border-radius: var(--borda); font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; transition: 0.3s; }
        .btn-laranja { background: var(--laranja); color: white; }
        .btn-azul { background: var(--azul); color: white; }
        .btn-verde { background: var(--verde-fluo); color: #1A1D23; }
        .aviso-bonus { background: rgba(0,255,148,0.1); color: var(--verde-fluo); padding: 0.5rem; border-radius: 6px; font-size: 0.9rem; margin-bottom: 0.5rem; display: inline-block; }
        .container { max-width: 1280px; margin: 2rem auto; padding: 0 5%; }
        .grid-videos { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.8rem; }
        .card-video { background: var(--cinza-medio); border-radius: var(--borda); padding: 1.5rem; border-top: 3px solid var(--azul); transition: 0.3s; }
        .card-video:hover { transform: translateY(-5px); border-top-color: var(--verde-fluo); }
        .card-video.meu-video { border-top-color: var(--laranja); }
        .card-video h3 { color: var(--verde-fluo); margin-bottom: 0.8rem; }
        .meta { margin-bottom: 0.5rem; font-size: 0.95rem; }
        .vazio { text-align: center; padding: 4rem 2rem; color: #888; font-size: 1.2rem; }
    </style>
</head>
<body>
    <header>
        <h1>��� Sistema Kawi — 1.000 Visualizações Grátis</h1>
        <div style="display:flex; gap:1.5rem; align-items:center;">
            <p id="saldo-creditos" class="saldo">Seu saldo: 0 créditos</p>
            <a href="dashboard.html" class="btn btn-verde">📊 Dashboard</a>
            <a href="cadastro.html" class="btn btn-laranja">+ Cadastrar (ganha 1.000 grátis)</a>
            <a href="admin-login.html" class="btn btn-azul">🔐 Admin</a>
        </div>
    </header>
    <main class="container">
        <section id="lista-videos" class="grid-videos">
            <p class="vazio">Carregando vídeos...</p>
        </section>
    </main>
    <script>
        const STORAGE_VIDEOS = 'kawi_videos';
        const STORAGE_USUARIO = 'kawi_usuario';
        function getDados(chave) { return JSON.parse(localStorage.getItem(chave) || '[]'); }
        function salvarDados(chave, dados) { localStorage.setItem(chave, JSON.stringify(dados)); }
        function getUsuario() {
            let usuario = JSON.parse(localStorage.getItem(STORAGE_USUARIO) || 'null');
            if (!usuario) {
                usuario = { id: Date.now(), nome: 'Membro_' + Math.floor(Math.random() * 9999), creditos: 0 };
                localStorage.setItem(STORAGE_USUARIO, JSON.stringify(usuario));
            }
            return usuario;
        }
        // SISTEMA DE VISUALIZAÇÕES AUTOMÁTICAS GRÁTIS
        function processarVisualizacoesAutomaticas() {
            let videos = getDados(STORAGE_VIDEOS);
            let alterou = false;
            videos.forEach(v => {
                if (v.bonusGratisAtivo && v.visualizacoesAutomaticas > 0) {
                    const adicionar = Math.min(50, v.visualizacoesAutomaticas);
                    v.visualizacoes += adicionar;
                    v.visualizacoesAutomaticas -= adicionar;
                    alterou = true;
                }
            });
            if (alterou) salvarDados(STORAGE_VIDEOS, videos);
        }
        document.addEventListener('DOMContentLoaded', () => {
            processarVisualizacoesAutomaticas(); // Roda automaticamente ao abrir
            const usuario = getUsuario();
            const videos = getDados(STORAGE_VIDEOS);
            const listaEl = document.getElementById('lista-videos');
            document.getElementById('saldo-creditos').textContent = 'Seu saldo: ' + usuario.creditos + ' créditos';
            if (videos.length === 0) {
                listaEl.innerHTML = '<p class="vazio">Nenhum vídeo cadastrado ainda. Cadastre o seu e ganhe 1.000 visualizações grátis!</p>';
                return;
            }
            listaEl.innerHTML = videos.map(video => {
                const ehMeu = video.criadorId === usuario.id;
                return '<div class="card-video ' + (ehMeu ? 'meu-video' : '') + '">' +
                    (video.bonusGratisAtivo ? '<span class="aviso-bonus">��� BÔNUS GRÁTIS ATIVO</span><br>' : '') +
                    '<h3>' + video.titulo + '</h3>' +
                    '<p class="meta">��� Criador: ' + video.nomeCriador + '</p>' +
                    '<p class="meta">��� Total de visualizações: ' + (video.visualizacoes || 0) + '</p>' +
                    (ehMeu ? 
                        '<a href="planos.html?video=' + video.id + '" class="btn btn-azul" style="margin-top:1rem;">Contratar Plano Maior</a>' :
                        '<button class="btn btn-verde" style="margin-top:1rem;" onclick="assistirVideo(' + video.id + ')">���️ Assistir e Ganhar +1 Crédito</button>'
                    ) + '</div>';
            }).join('');
        });
        function assistirVideo(videoId) {
            let videos = getDados(STORAGE_VIDEOS);
            let usuario = getUsuario();
            const idx = videos.findIndex(v => v.id === videoId);
            if (idx === -1) return;
            videos[idx].visualizacoes += 1;
            usuario.creditos += 1;
            salvarDados(STORAGE_VIDEOS, videos);
            localStorage.setItem(STORAGE_USUARIO, JSON.stringify(usuario));
            alert('✅ Feito! Ganhou +1 crédito. Total: ' + usuario.creditos);
            window.location.reload();
        }
    </script>
</body>
</html>
